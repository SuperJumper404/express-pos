services:
  app:
    image: node:20-alpine
    container_name: express_pos_app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DBHOST: db
      DBPORT: 3306
      DBUSER: ${COMPOSE_DB_USER:-smarteat}
      DBPASS: ${COMPOSE_DB_PASS:-smarteat}
      DBNAME: ${COMPOSE_DB_NAME:-pointofsale}
      DATABASE_URL: mysql://${COMPOSE_DB_USER:-smarteat}:${COMPOSE_DB_PASS:-smarteat}@db:3306/${COMPOSE_DB_NAME:-pointofsale}
      PUBLICIMAGEPATH: ${PUBLICIMAGEPATH:-/home/smarteat/public}
    command: sh -c "npm install --include=dev && npm run db:up && node index.js"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - public_uploads:/home/smarteat/public
    ports:
      - "${APP_PORT:-5005}:${PORT:-5005}"

  db:
    image: mysql:8.0.33
    container_name: express_pos_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smarteat}
      MYSQL_DATABASE: ${COMPOSE_DB_NAME:-pointofsale}
      MYSQL_USER: ${COMPOSE_DB_USER:-smarteat}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASS:-smarteat}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./db/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-smarteat}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: express_pos_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"

volumes:
  mysql_data:
  public_uploads:
  node_modules:
