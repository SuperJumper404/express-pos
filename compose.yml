version: "3.9"

services:
  app:
    image: node:20-alpine
    container_name: express_pos_app_staging
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.staging
    command: sh -c "npm install --include=dev && npm run db:up && node index.js"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - public_uploads:/home/smarteat/public
    ports:
      - "5005:5005"

  db:
    image: mysql:8.0.33
    container_name: express_pos_db_staging
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env.staging
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./db/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: express_pos_phpmyadmin_staging
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.staging
    ports:
      - "8080:80"

volumes:
  mysql_data:
  public_uploads:
  node_modules:
