name: Deploy Backend to Production

on:
  # push:
  #   branches:
  #     - master

  workflow_dispatch:
    inputs:
      mode:
        description: "Modes de déploiement"
        required: true
        type: choice
        options:
          - compose
          - pm2

jobs:
  deploy-compose:
    if: ${{ github.event_name == 'push' || inputs.mode == 'compose' }}
    runs-on: smarteat-runner-backend

    steps:
      - name: Deploy on server with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.140
          username: smarteatprod
          password: root
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/smarteatprod/smarteat/backend
            BRANCH=master
            REPO_URL=https://github.com/SuperJumper404/express-pos.git
            COMPOSE_FILE=compose.yml

            rm -rf "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            # export DOTENV_PRIVATE_KEY_PRODUCTION='${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}'
            # npx dotenvx decrypt -f .env.production

            docker compose --env-file .env.production -f "$COMPOSE_FILE" down --remove-orphans || true
            docker compose --env-file .env.production -f "$COMPOSE_FILE" up -d --force-recreate

            docker compose --env-file .env.production -f "$COMPOSE_FILE" ps

  deploy-pm2:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'pm2' }}
    runs-on: smarteat-runner-backend

    steps:
      - name: Deploy on server with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.140
          username: smarteatprod
          password: root
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/smarteatprod/smarteat/backend
            APP_NAME=backend_smart_eat_production
            BRANCH=master
            REPO_URL=https://github.com/SuperJumper404/express-pos.git

            rm -rf "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            npm install

            # export DOTENV_PRIVATE_KEY_PRODUCTION='${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}'
            # npx dotenvx decrypt -f .env.production

            set -a
            . ./.env.production
            set +a

            npm run db:up:production

            pm2 delete "$APP_NAME" || true
            pm2 start ecosystem.config.js --env production --name "$APP_NAME"
            pm2 save
