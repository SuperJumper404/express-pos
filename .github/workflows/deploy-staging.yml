name: Deploy Backend to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: smarteat-runner-backend

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.179
          username: webserversmarteat
          password: root
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/webserversmarteat/smarteat/backend
            APP_NAME=backend_smart_eat_staging
            BRANCH=staging
            REPO_URL=https://github.com/SuperJumper404/express-pos.git

            rm -rf "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            npm install

            export DOTENV_PRIVATE_KEY_STAGING='${{ secrets.DOTENV_PRIVATE_KEY_STAGING }}'
            npx dotenvx decrypt -f .env.staging
            ls -la
            cat .env.staging
            set -a
            . ./.env.staging
            set +a
            printenv

            #Migrations
            npm run db:up:staging

            pm2 delete "$APP_NAME" || true
            pm2 start ecosystem.config.js --env staging --name "$APP_NAME"
            pm2 save
